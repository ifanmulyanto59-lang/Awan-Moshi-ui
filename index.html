<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awan Moshi OS</title>

<style>
:root{
  --bg:#f5f1ea;
  --card:#ffffff;
  --accent:#111111;
}

*{
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  color:#111;
  padding:20px;
  text-align:center;
}

h1{
  margin-bottom:30px;
}

.container{
  max-width:420px;
  margin:auto;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:22px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

button{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:15px;
  font-weight:600;
  cursor:pointer;
}

input[type=range]{
  width:100%;
  margin-top:10px;
}

.status{
  margin-top:10px;
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>🐾 Awan Moshi OS</h1>

<div class="container">

<!-- Brightness -->
<div class="card">
<h3>Brightness</h3>
<input type="range" min="0" max="255" id="brightnessSlider">
<br><br>
<button onclick="setBrightness()">Set</button>
<div class="status" id="brightStatus"></div>
</div>

<!-- Sync Time -->
<div class="card">
<h3>Sync Time</h3>
<button onclick="syncTime()">Sync</button>
<div class="status" id="timeStatus"></div>
</div>

<!-- Upload Image -->
<div class="card">
<h3>🖼 Upload Custom Image</h3>

<form method="POST"
      action="http://192.168.4.1/upload"
      enctype="multipart/form-data">

  <input type="file" name="file" accept="image/*">
  <br><br>
  <button type="submit">Upload</button>

</form>

<div class="status">
Foto akan langsung tampil di Moshi
</div>

</div>

</div>

<script>

const deviceIP = "http://192.168.4.1";

function setBrightness(){
  const value = document.getElementById("brightnessSlider").value;
  const status = document.getElementById("brightStatus");

  status.innerText = "Sending...";

  fetch(deviceIP + "/brightness?val=" + value, {
    mode: "no-cors"
  });

  status.innerText = "Done ✨";
}

function syncTime(){
  const epoch = Math.floor(Date.now()/1000);
  const status = document.getElementById("timeStatus");

  status.innerText = "Syncing...";

  fetch(deviceIP + "/settime?epoch=" + epoch, {
    mode: "no-cors"
  });

  status.innerText = "Synced 🕒";
}

</script>

</body>
</html>
